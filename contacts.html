<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ChatCity — Contacts</title>
<link rel="stylesheet" href="style.css">
<style>
#root { display:flex;flex-direction:column;height:100dvh; }
.content { flex:1;overflow-y:auto; }
.search-section { padding:12px 16px; background:var(--bg2); border-bottom:1px solid var(--border); position:sticky;top:0;z-index:5; }
.search-box {
  display:flex;align-items:center;gap:10px;
  background:var(--bg3); border:1.5px solid var(--border2);
  border-radius:30px; padding:10px 16px;
}
.search-box input {
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:14px;font-family:var(--font);
}
.search-box input::placeholder { color:var(--text3); }
.contact-item {
  display:flex;align-items:center;gap:12px;
  padding:13px 18px; border-bottom:1px solid var(--border);
  cursor:pointer; transition:background .15s;
}
.contact-item:active { background:var(--bg3); }
.c-av { width:48px;height:48px;border-radius:50%;font-size:16px;flex-shrink:0;overflow:hidden; }
.c-av img { width:100%;height:100%;object-fit:cover;border-radius:50%; }
.c-info { flex:1;min-width:0; }
.c-name { font-size:15px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.c-email { font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.add-btn {
  background:rgba(124,110,255,0.12);
  border:1px solid rgba(124,110,255,0.25);
  color:var(--accent); border-radius:10px;
  padding:7px 16px; font-size:12px;font-weight:700;
  cursor:pointer;font-family:var(--font);
  transition:all .2s;flex-shrink:0;
}
.add-btn:hover { background:var(--accent);color:#fff; }
.add-btn.added { background:rgba(45,212,160,0.12);border-color:rgba(45,212,160,0.3);color:var(--green); }
.empty { text-align:center;padding:60px 24px;color:var(--text3); }
.empty-icon { font-size:48px;margin-bottom:12px;opacity:.5; }
.results-label { font-size:11px;font-weight:800;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;padding:14px 18px 8px; }
</style>
</head>
<body>
<div id="toast"></div>
<div id="root">
  <div class="topbar">
    <button class="back-btn btn" style="background:none;border:none;color:var(--text2);font-size:26px;cursor:pointer;padding:4px;" onclick="go('home.html')">←</button>
    <div class="topbar-title">Contacts</div>
    <div style="width:38px;"></div>
  </div>

  <div class="content">
    <div class="search-section">
      <div class="search-box">
        <span style="font-size:18px;color:var(--text3);">🔍</span>
        <input type="text" id="search" placeholder="Search by name or email…" oninput="doSearch()">
        <button onclick="clearSearch()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;" id="clear-btn" class="hidden">✕</button>
      </div>
    </div>

    <!-- Search results -->
    <div id="search-results" class="hidden">
      <div class="results-label">SEARCH RESULTS</div>
      <div id="results-list"></div>
    </div>

    <!-- My contacts -->
    <div id="contacts-section">
      <div class="results-label">MY CONTACTS</div>
      <div id="contacts-list"></div>
      <div id="no-contacts" class="empty hidden">
        <div class="empty-icon">👥</div>
        <div>No contacts yet.<br>Search above to add people.</div>
      </div>
    </div>
  </div>

  <nav class="bnav">
    <button class="nbtn" onclick="go('home.html')"><span class="ni">💬</span><span class="nl">Chats</span></button>
    <button class="nbtn active" onclick="go('contacts.html')"><span class="ni">👥</span><span class="nl">Contacts</span></button>
    <button class="nbtn" onclick="go('profile.html')"><span class="ni">👤</span><span class="nl">Profile</span></button>
  </nav>
</div>

<script type="module">
import {
  auth, db,
  ref, get, set, onValue,
  onAuthStateChanged,
  colorFor, initialsOf,
  getSession, setOnline, toast, go
} from './firebase.js';

let me=null, myContacts={};
window.go=go;

onAuthStateChanged(auth, async user=>{
  if(!user){go('index.html');return;}
  const sess=getSession();
  if(!sess||sess.uid!==user.uid){go('index.html');return;}
  me=user;
  await setOnline(me.uid);
  loadContacts();
});

function loadContacts(){
  onValue(ref(db,`users/${me.uid}/contacts`),async snap=>{
    myContacts=snap.val()||{};
    const list=document.getElementById('contacts-list');
    list.innerHTML='';
    const ids=Object.keys(myContacts);
    if(!ids.length){ document.getElementById('no-contacts').classList.remove('hidden'); return; }
    document.getElementById('no-contacts').classList.add('hidden');
    for(const uid of ids){
      const u=(await get(ref(db,`users/${uid}`))).val();
      if(!u)continue;
      list.appendChild(buildItem(u,'chat'));
    }
  });
}

function buildItem(u, action) {
  const item=document.createElement('div');
  item.className='contact-item';
  const avHtml=u.photo?`<img src="${u.photo}" alt="">`:`<div class="av c-av" style="background:${u.color||colorFor(u.uid)};width:48px;height:48px;font-size:16px;">${u.initials||initialsOf(u.name||'?')}</div>`;
  const isAdded=!!myContacts[u.uid];

  if(action==='chat'){
    item.onclick=()=>{
      sessionStorage.setItem('cc_chat_target',JSON.stringify({uid:u.uid,name:u.name,initials:u.initials||initialsOf(u.name||'?'),color:u.color||colorFor(u.uid),photo:u.photo||''}));
      go('chat.html');
    };
    item.innerHTML=`<div class="c-av" style="overflow:hidden;">${avHtml}</div>
      <div class="c-info"><div class="c-name">${u.name||'User'}</div><div class="c-email">${u.email||''}</div></div>
      <span style="color:var(--accent);font-size:20px;">›</span>`;
  } else {
    item.innerHTML=`<div class="c-av" style="overflow:hidden;">${avHtml}</div>
      <div class="c-info"><div class="c-name">${u.name||'User'}</div><div class="c-email">${u.email||''}</div></div>
      <button class="add-btn ${isAdded?'added':''}" id="add-${u.uid}" onclick="addContact('${u.uid}',this);event.stopPropagation();">${isAdded?'✓ Added':'Add'}</button>`;
    if(!isAdded){
      item.onclick=()=>{
        sessionStorage.setItem('cc_chat_target',JSON.stringify({uid:u.uid,name:u.name,initials:u.initials||initialsOf(u.name||'?'),color:u.color||colorFor(u.uid),photo:u.photo||''}));
        go('chat.html');
      };
    }
  }
  return item;
}

let searchTimer=null;
window.doSearch=()=>{
  const q=document.getElementById('search').value.trim();
  document.getElementById('clear-btn').classList.toggle('hidden',!q);
  clearTimeout(searchTimer);
  if(!q){ document.getElementById('search-results').classList.add('hidden'); return; }
  if(q.length<2) return;
  searchTimer=setTimeout(()=>runSearch(q),400);
};
window.clearSearch=()=>{
  document.getElementById('search').value='';
  document.getElementById('search-results').classList.add('hidden');
  document.getElementById('clear-btn').classList.add('hidden');
};

async function runSearch(q){
  const snap=await get(ref(db,'users'));
  const ql=q.toLowerCase();
  const found=Object.values(snap.val()||{}).filter(u=>
    u.uid!==me.uid&&(u.name?.toLowerCase().includes(ql)||u.email?.toLowerCase().includes(ql))
  );
  const list=document.getElementById('results-list');
  list.innerHTML='';
  document.getElementById('search-results').classList.remove('hidden');
  if(!found.length){
    list.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><div>No users found</div></div>';
    return;
  }
  found.forEach(u=>list.appendChild(buildItem(u,'add')));
}

window.addContact=async(uid,btn)=>{
  btn.textContent='Adding…'; btn.disabled=true;
  await set(ref(db,`users/${me.uid}/contacts/${uid}`),true);
  await set(ref(db,`users/${uid}/contacts/${me.uid}`),true);
  myContacts[uid]=true;
  btn.textContent='✓ Added'; btn.className='add-btn added'; btn.disabled=false;
  toast('Contact added!','ok');
};
</script>
</body>
</html>
