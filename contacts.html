<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ChatCity — Contacts</title>
<link rel="stylesheet" href="style.css">
<style>
#root { display:flex;flex-direction:column;height:100dvh; }
.content { flex:1;overflow-y:auto; }
.search-section { padding:12px 16px; background:var(--bg2); border-bottom:1px solid var(--border); position:sticky;top:0;z-index:5; }
.search-box {
  display:flex;align-items:center;gap:10px;
  background:var(--bg3); border:1.5px solid var(--border2);
  border-radius:30px; padding:10px 16px;
}
.search-box input {
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:14px;font-family:var(--font);
}
.search-box input::placeholder { color:var(--text3); }
.search-loading { font-size:12px;color:var(--text3);display:none; }

.contact-item {
  display:flex;align-items:center;gap:12px;
  padding:13px 18px; border-bottom:1px solid var(--border);
  cursor:pointer; transition:background .15s;
}
.contact-item:active { background:var(--bg3); }
.c-av { width:48px;height:48px;border-radius:50%;font-size:16px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:800; }
.c-av img { width:100%;height:100%;object-fit:cover; }
.c-info { flex:1;min-width:0; }
.c-name { font-size:15px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.c-email { font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.chat-btn {
  background:rgba(45,212,160,0.12);
  border:1px solid rgba(45,212,160,0.25);
  color:var(--green); border-radius:10px;
  padding:7px 16px; font-size:12px;font-weight:700;
  cursor:pointer;font-family:var(--font);
  transition:all .2s;flex-shrink:0;
}
.chat-btn:hover { background:var(--green);color:#000; }
.empty { text-align:center;padding:60px 24px;color:var(--text3); }
.empty-icon { font-size:48px;margin-bottom:12px;opacity:.5; }
.results-label { font-size:11px;font-weight:800;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;padding:14px 18px 8px; }
.section-label { font-size:11px;font-weight:800;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;padding:14px 18px 8px;margin-top:10px; }
.no-results { text-align:center;padding:40px 24px;color:var(--text3);font-size:13px; }
</style>
</head>
<body>
<div id="toast"></div>
<div id="root">
  <div class="topbar">
    <button class="back-btn btn" style="background:none;border:none;color:var(--text2);font-size:26px;cursor:pointer;padding:4px;" onclick="go('home.html')">←</button>
    <div class="topbar-title">Contacts</div>
    <div style="width:38px;"></div>
  </div>

  <div class="content">
    <div class="search-section">
      <div class="search-box">
        <span style="font-size:18px;color:var(--text3);">🔍</span>
        <input type="text" id="search" placeholder="Search name or email…" oninput="doSearch()">
        <span class="search-loading" id="search-loading">⏳</span>
        <button onclick="clearSearch()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;" id="clear-btn" class="hidden">✕</button>
      </div>
    </div>

    <!-- Search results -->
    <div id="search-results" class="hidden">
      <div class="results-label">SEARCH RESULTS</div>
      <div id="results-list"></div>
    </div>

    <!-- Suggested Users -->
    <div id="suggestions-section">
      <div class="section-label">💡 SUGGESTED USERS</div>
      <div id="suggestions-list"></div>
      <div id="no-suggestions" class="empty hidden">
        <div class="empty-icon">👥</div>
        <div>No suggestions available yet</div>
      </div>
    </div>

    <!-- My contacts -->
    <div id="contacts-section">
      <div class="section-label">MY CONTACTS</div>
      <div id="contacts-list"></div>
      <div id="no-contacts" class="empty hidden">
        <div class="empty-icon">👥</div>
        <div>No contacts yet</div>
      </div>
    </div>
  </div>

  <nav class="bnav">
    <button class="nbtn" onclick="go('home.html')"><span class="ni">💬</span><span class="nl">Chats</span></button>
    <button class="nbtn active" onclick="go('contacts.html')"><span class="ni">👥</span><span class="nl">Contacts</span></button>
    <button class="nbtn" onclick="go('profile.html')"><span class="ni">👤</span><span class="nl">Profile</span></button>
  </nav>
</div>

<script type="module">
import {
  auth, db,
  ref, get, set, onValue, off,
  onAuthStateChanged,
  colorFor, initialsOf,
  getSession, setOnline, toast, go,
  searchUsers,
  getAllUsers
} from './firebase.js';

let me=null, myContacts={}, suggestions={};
let suggestionsListener=null;
window.go=go;

onAuthStateChanged(auth, async user=>{
  if(!user){go('index.html');return;}
  const sess=getSession();
  if(!sess||sess.uid!==user.uid){go('index.html');return;}
  me=user;
  await setOnline(me.uid);
  loadContacts();
  listenSuggestions();
});

function loadContacts(){
  onValue(ref(db,`users/${me.uid}/contacts`),async snap=>{
    myContacts=snap.val()||{};
    const list=document.getElementById('contacts-list');
    list.innerHTML='';
    const ids=Object.keys(myContacts);
    if(!ids.length){ document.getElementById('no-contacts').classList.remove('hidden'); return; }
    document.getElementById('no-contacts').classList.add('hidden');
    for(const uid of ids){
      const u=(await get(ref(db,`users/${uid}`))).val();
      if(!u)continue;
      list.appendChild(buildContactItem(u));
    }
  });
}

function listenSuggestions(){
  if(suggestionsListener) off(suggestionsListener);
  suggestionsListener = ref(db,'suggestions');
  onValue(suggestionsListener, async snap=>{
    const suggestedUIDs=snap.val()||{};
    suggestions=suggestedUIDs;
    
    const list=document.getElementById('suggestions-list');
    list.innerHTML='';
    const ids=Object.keys(suggestedUIDs).filter(uid=>uid!==me.uid&&suggestedUIDs[uid]===true);
    
    if(!ids.length){ 
      document.getElementById('no-suggestions').classList.remove('hidden'); 
      return; 
    }
    document.getElementById('no-suggestions').classList.add('hidden');
    
    for(const uid of ids){
      try {
        const u=(await get(ref(db,`users/${uid}`))).val();
        if(!u)continue;
        list.appendChild(buildSuggestionItem(u));
      } catch(e) {
        console.error('Load suggestion error:', e);
      }
    }
  });
}

function buildContactItem(u) {
  const item=document.createElement('div');
  item.className='contact-item';
  const avHtml=u.photo?`<img src="${u.photo}">`:`<div style="background:${u.color||colorFor(u.uid)};width:48px;height:48px;border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center;font-weight:800;">${u.initials||initialsOf(u.name||'?')}</div>`;
  
  item.onclick=()=>{
    sessionStorage.setItem('cc_chat_target',JSON.stringify({uid:u.uid,name:u.name,initials:u.initials||initialsOf(u.name||'?'),color:u.color||colorFor(u.uid),photo:u.photo||''}));
    go('chat.html');
  };
  item.innerHTML=`<div class="c-av">${avHtml}</div>
    <div class="c-info"><div class="c-name">${u.name||'User'}</div><div class="c-email">${u.email||''}</div></div>
    <span style="color:var(--accent);font-size:20px;">›</span>`;
  return item;
}

function buildSuggestionItem(u) {
  const item=document.createElement('div');
  item.className='contact-item';
  const avHtml=u.photo?`<img src="${u.photo}">`:`<div style="background:${u.color||colorFor(u.uid)};width:48px;height:48px;border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center;font-weight:800;">${u.initials||initialsOf(u.name||'?')}</div>`;
  
  item.innerHTML=`<div class="c-av">${avHtml}</div>
    <div class="c-info"><div class="c-name">${u.name||'User'}</div><div class="c-email">${u.email||''}</div></div>
    <button class="chat-btn" onclick="startChat('${u.uid}','${u.name}','${u.initials||initialsOf(u.name||'?')}','${u.color||colorFor(u.uid)}','${u.photo||''}');event.stopPropagation();">💬 Chat</button>`;
  return item;
}

window.startChat=(uid,name,initials,color,photo)=>{
  sessionStorage.setItem('cc_chat_target',JSON.stringify({uid,name,initials,color,photo}));
  go('chat.html');
};

let searchTimer=null;
window.doSearch=async()=>{
  const q=document.getElementById('search').value.trim();
  const loading=document.getElementById('search-loading');
  const clearBtn=document.getElementById('clear-btn');
  
  clearBtn.classList.toggle('hidden',!q);
  
  if(!q){ 
    document.getElementById('search-results').classList.add('hidden'); 
    return; 
  }
  if(q.length<1) return;
  
  clearTimeout(searchTimer);
  loading.style.display='inline';
  
  searchTimer=setTimeout(async()=>{
    try {
      const results = await searchUsers(q, me.uid);
      const list=document.getElementById('results-list');
      list.innerHTML='';
      document.getElementById('search-results').classList.remove('hidden');
      
      if(!results.length){
        list.innerHTML='<div class="no-results">No users found</div>';
      } else {
        results.forEach(u=>list.appendChild(buildSearchResult(u)));
      }
    } catch(e) {
      console.error('Search error:', e);
    } finally {
      loading.style.display='none';
    }
  }, 300);
};

window.clearSearch=()=>{
  document.getElementById('search').value='';
  document.getElementById('search-results').classList.add('hidden');
  document.getElementById('clear-btn').classList.add('hidden');
};

function buildSearchResult(u) {
  const item=document.createElement('div');
  item.className='contact-item';
  const avHtml=u.photo?`<img src="${u.photo}">`:`<div style="background:${u.color||colorFor(u.uid)};width:48px;height:48px;border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center;font-weight:800;">${u.initials||initialsOf(u.name||'?')}</div>`;
  
  item.innerHTML=`<div class="c-av">${avHtml}</div>
    <div class="c-info"><div class="c-name">${u.name||'User'}</div><div class="c-email">${u.email||''}</div></div>
    <button class="chat-btn" onclick="startChat('${u.uid}','${u.name}','${u.initials||initialsOf(u.name||'?')}','${u.color||colorFor(u.uid)}','${u.photo||''}');event.stopPropagation();">💬 Chat</button>`;
  return item;
}
</script>
</body>
</html>
