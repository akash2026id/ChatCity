<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ChatCity — Admin Panel</title>
<link rel="stylesheet" href="css/style.css">
<style>
body { display:flex;align-items:center;justify-content:center;padding:20px;overflow:auto; }
#admin-root { display:none;flex-direction:column;height:100dvh; }
.login-card { background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);padding:32px 24px;width:100%;max-width:380px; }
.admin-badge { display:inline-flex;align-items:center;gap:6px;background:rgba(247,201,75,0.15);border:1px solid rgba(247,201,75,0.3);color:var(--yellow);border-radius:20px;padding:4px 14px;font-size:12px;font-weight:700;margin-bottom:20px; }
.stat-grid { display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 16px 0; }
.stat-card { background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:18px 16px;text-align:center; }
.stat-num { font-size:32px;font-weight:800;font-family:var(--font2);color:var(--accent); }
.stat-label { font-size:12px;color:var(--text2);margin-top:4px; }
.error-item { background:var(--bg2);border:1px solid rgba(255,83,112,0.2);border-radius:var(--r);padding:14px 16px;margin:0 16px 10px; }
.error-msg { font-size:13px;color:var(--red);font-family:var(--font2);margin-bottom:4px;word-break:break-all; }
.error-ctx { font-size:11px;color:var(--text3); }
.error-time { font-size:11px;color:var(--text3);margin-top:4px; }
.user-item { display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border); }
.online-ind { width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0; }
.offline-ind { width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0; }
</style>
</head>
<body>
<div id="toast"></div>

<!-- LOGIN -->
<div id="admin-login" style="width:100%;max-width:380px;">
  <div class="login-card">
    <div class="admin-badge">🛡 Admin Panel</div>
    <div style="font-size:24px;font-weight:800;font-family:var(--font2);margin-bottom:4px;">ChatCity Admin</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:24px;">Restricted access only</div>
    <div style="margin-bottom:12px;">
      <label class="form-label" style="font-size:12px;font-weight:700;color:var(--text2);display:block;margin-bottom:6px;">Admin Email</label>
      <input class="inp" type="email" id="a-email" placeholder="admin@chatcity.com">
    </div>
    <div style="margin-bottom:16px;">
      <label class="form-label" style="font-size:12px;font-weight:700;color:var(--text2);display:block;margin-bottom:6px;">Admin Passkey</label>
      <input class="inp" type="password" id="a-pass" placeholder="••••" onkeydown="if(event.key==='Enter')adminLogin()">
    </div>
    <button class="btn btn-primary" style="width:100%;" onclick="adminLogin()">Login to Admin →</button>
    <div id="a-err" style="color:var(--red);font-size:12px;text-align:center;margin-top:10px;min-height:14px;"></div>
    <div style="text-align:center;margin-top:16px;"><a href="index.html" style="color:var(--text3);font-size:13px;text-decoration:none;">← Back to ChatCity</a></div>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="admin-root">
  <div class="topbar">
    <div class="topbar-title">🛡 Admin <span>Panel</span></div>
    <button class="btn btn-ghost" style="padding:8px 14px;font-size:13px;" onclick="adminLogout()">Logout</button>
  </div>

  <div style="flex:1;overflow-y:auto;padding-bottom:20px;">
    <!-- Stats -->
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-num" id="stat-users">—</div>
        <div class="stat-label">Total Users</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-online" style="color:var(--green);">—</div>
        <div class="stat-label">Online Now</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-chats" style="color:var(--yellow);">—</div>
        <div class="stat-label">Total Chats</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-errors" style="color:var(--red);">—</div>
        <div class="stat-label">Errors</div>
      </div>
    </div>

    <!-- Error log -->
    <div class="sec-label" style="padding:16px 16px 8px;">ERROR LOG</div>
    <div id="error-list">
      <div style="text-align:center;padding:24px;color:var(--text3);font-size:13px;">No errors logged 🎉</div>
    </div>

    <!-- Users -->
    <div class="sec-label" style="padding:16px 16px 8px;">ALL USERS</div>
    <div id="users-list"></div>
  </div>
</div>

<script type="module">
import { db, ref, get, onValue, remove } from './js/firebase.js';

const ADMIN_EMAIL  = 'admin@chatcity.com';
const ADMIN_PASS   = '9999';
const ADMIN_KEY    = 'cc_admin_sess';

function fmtDate(ts){
  const d=new Date(ts);
  return d.toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
}

// ── Login ──
window.adminLogin=()=>{
  const email=document.getElementById('a-email').value.trim();
  const pass=document.getElementById('a-pass').value;
  const err=document.getElementById('a-err');
  if(email===ADMIN_EMAIL&&pass===ADMIN_PASS){
    sessionStorage.setItem(ADMIN_KEY,'1');
    showDashboard();
  } else {
    err.textContent='Wrong email or passkey';
    setTimeout(()=>err.textContent='',3000);
  }
};
window.adminLogout=()=>{
  sessionStorage.removeItem(ADMIN_KEY);
  document.getElementById('admin-root').style.display='none';
  document.getElementById('admin-login').style.display='block';
};

if(sessionStorage.getItem(ADMIN_KEY)==='1'){
  document.getElementById('admin-login').style.display='none';
  showDashboard();
}

async function showDashboard(){
  document.getElementById('admin-login').style.display='none';
  const root=document.getElementById('admin-root');
  root.style.display='flex'; root.style.flexDirection='column';

  // Load stats
  const [usersSnap,chatsSnap,errSnap]=await Promise.all([
    get(ref(db,'users')),get(ref(db,'chats')),get(ref(db,'admin/errors'))
  ]);

  const users=Object.values(usersSnap.val()||{});
  const online=users.filter(u=>u.online).length;
  const chats=Object.keys(chatsSnap.val()||{}).length;
  const errors=Object.entries(errSnap.val()||{});

  document.getElementById('stat-users').textContent=users.length;
  document.getElementById('stat-online').textContent=online;
  document.getElementById('stat-chats').textContent=chats;
  document.getElementById('stat-errors').textContent=errors.length;

  // Errors
  const errList=document.getElementById('error-list');
  if(errors.length){
    errList.innerHTML='';
    errors.slice(-20).reverse().forEach(([id,e])=>{
      const div=document.createElement('div');div.className='error-item';
      div.innerHTML=`<div class="error-msg">⚠ ${e.error||'Unknown error'}</div>
        <div class="error-ctx">Context: ${e.context||'—'}</div>
        <div class="error-time">${e.ts?fmtDate(e.ts):'Unknown time'} · ${(e.ua||'').substring(0,60)}…</div>
        <button onclick="clearErr('${id}')" style="margin-top:8px;background:none;border:1px solid rgba(255,83,112,.3);color:var(--red);border-radius:8px;padding:4px 12px;font-size:12px;cursor:pointer;">Delete</button>`;
      errList.appendChild(div);
    });
  }

  // Users
  const ul=document.getElementById('users-list');
  users.sort((a,b)=>a.name?.localeCompare(b.name||'')).forEach(u=>{
    const div=document.createElement('div');div.className='user-item';
    div.innerHTML=`<div class="${u.online?'online':'offline'}-ind"></div>
      <div class="av" style="width:36px;height:36px;border-radius:50%;background:${u.color||'#7c6eff'};font-size:12px;flex-shrink:0;">${u.initials||'?'}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-weight:700;font-size:14px;">${u.name||'Unknown'}</div>
        <div style="font-size:12px;color:var(--text2);">${u.email||''}</div>
      </div>
      <div style="font-size:11px;color:var(--text3);text-align:right;">${u.online?'<span style="color:var(--green);">● Online</span>':'Offline'}<br>${u.createdAt?fmtDate(u.createdAt):''}</div>`;
    ul.appendChild(div);
  });

  // Live refresh online count
  onValue(ref(db,'users'),snap=>{
    const all=Object.values(snap.val()||{});
    document.getElementById('stat-online').textContent=all.filter(u=>u.online).length;
  });
}

window.clearErr=async id=>{
  await remove(ref(db,`admin/errors/${id}`));
  location.reload();
};
</script>
</body>
</html>
